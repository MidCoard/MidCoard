name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MidCoard
          filename: github-metrics.svg

          template: classic
          base: header, activity, repositories, metadata
          config_timezone: Asia/Shanghai
          config_animations: yes
          config_order: base.header, isocalendar, languages, habits, repositories, activity, lines

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 12
          plugin_languages_threshold: 1%
          plugin_languages_colors: github
          plugin_languages_categories: programming, markup
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_analysis_timeout: 120
          plugin_languages_ignored: html, css, scss, glsl, cmake, assembly

          plugin_habits: yes
          plugin_habits_days: 60
          plugin_habits_from: 300
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_facts: yes
          plugin_habits_trim: yes

          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_starred: 3
          plugin_repositories_forks: no

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, release

          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
